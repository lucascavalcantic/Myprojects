<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
</head>
<body>
  <script>
    function init() {
      miro.board.ui.on('icon:click', function() {
        miro.board.ui.openPanel({
          url: 'https://myprojects-seven-beta.vercel.app/panel.html'
        });
      });
    }

    var checkMiro = setInterval(function() {
      if (window.miro && miro.board && miro.board.ui) {
        clearInterval(checkMiro);
        init();
      }
    }, 100);
  </script>
</body>
</html>
