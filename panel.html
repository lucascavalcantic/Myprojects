<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e6e0;
      --border2: #d4d0c8;
      --text: #1a1916;
      --muted: #9b9890;
      --muted2: #c4c1b8;
      --accent: #1a1916;
      --row-hover: #f0ede6;
      --col-w-name: 180px;
      --col-w-resp: 90px;
      --col-w-status: 80px;
      --col-w-est: 60px;
      --col-w-pri: 70px;
      --header-h: 38px;
      --row-h: 32px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
    }

    .badge {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      background: var(--text);
      color: var(--bg);
      border-radius: 3px;
      padding: 1px 5px;
      font-weight: 500;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-sm {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      border-radius: 5px;
      padding: 4px 9px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .btn-sm:hover { background: var(--row-hover); border-color: var(--border2); }

    .btn-sm.primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .btn-sm.primary:hover { opacity: 0.85; }

    /* ── Scroll area ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
    }

    .scroll-area::-webkit-scrollbar { width: 4px; height: 4px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── Table ── */
    .task-table {
      min-width: 560px;
      width: 100%;
    }

    /* ── Group ── */
    .group { margin-bottom: 0; }

    .group-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px 4px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .group-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 10px;
      padding: 0;
      line-height: 1;
      transition: transform 0.15s;
    }
    .group-toggle.collapsed { transform: rotate(-90deg); }

    .group-label {
      font-size: 11px;
      font-weight: 600;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      letter-spacing: 0.01em;
    }

    .group-count {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .group-actions {
      margin-left: auto;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .group-header:hover .group-actions { opacity: 1; }

    .group-action-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.12s, background 0.12s;
    }
    .group-action-btn:hover { color: var(--text); background: var(--border); }

    /* ── Column headers ── */
    .col-headers {
      display: grid;
      grid-template-columns: 24px var(--col-w-name) var(--col-w-resp) var(--col-w-status) var(--col-w-est) var(--col-w-pri) 1fr;
      align-items: center;
      padding: 0 12px;
      height: 26px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .col-header {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 3px;
      padding-right: 8px;
      white-space: nowrap;
    }

    .col-icon { font-size: 9px; }

    /* ── Task row ── */
    .task-row {
      display: grid;
      grid-template-columns: 24px var(--col-w-name) var(--col-w-resp) var(--col-w-status) var(--col-w-est) var(--col-w-pri) 1fr;
      align-items: center;
      padding: 0 12px;
      min-height: var(--row-h);
      border-bottom: 1px solid var(--border);
      cursor: default;
      transition: background 0.1s;
      animation: rowIn 0.18s ease;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .task-row:hover { background: var(--row-hover); }
    .task-row:hover .row-actions { opacity: 1; }

    .row-num {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      color: var(--muted2);
    }

    .row-name {
      font-size: 12px;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 8px;
      cursor: text;
    }

    .row-name[contenteditable="true"] {
      outline: none;
      background: var(--surface);
      border-radius: 3px;
      padding: 1px 4px;
      box-shadow: 0 0 0 1px var(--border2);
      white-space: nowrap;
    }

    .cell {
      padding-right: 8px;
      display: flex;
      align-items: center;
    }

    /* Status pill */
    .status-pill {
      font-size: 10px;
      font-weight: 500;
      border-radius: 3px;
      padding: 1px 6px;
      cursor: pointer;
      white-space: nowrap;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.12s;
    }
    .status-pill:hover { opacity: 0.8; }

    .s-todo    { background: #f0ede6; color: #6b6660; }
    .s-doing   { background: #fff4d6; color: #8a6c00; }
    .s-review  { background: #e8f0ff; color: #2d5be3; }
    .s-done    { background: #e6f7ee; color: #1a7a45; }

    /* Priority dot */
    .pri-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      flex-shrink: 0;
    }
    .pri-label { font-size: 10px; color: var(--muted); }

    .p-low    .pri-dot { background: #c4c1b8; }
    .p-med    .pri-dot { background: #f4a832; }
    .p-high   .pri-dot { background: #e8503a; }

    /* Estimate */
    .est-val {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    /* Assignee avatar */
    .avatar {
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 8px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Description */
    .desc-cell {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Row actions */
    .row-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.12s;
      margin-left: auto;
    }

    .row-action-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 3px 4px;
      border-radius: 3px;
      transition: color 0.1s, background 0.1s;
    }
    .row-action-btn:hover { color: var(--text); background: var(--border); }
    .row-action-btn.danger:hover { color: #e8503a; }

    /* Add row */
    .add-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px 6px 36px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      color: var(--muted);
      font-size: 11px;
      transition: background 0.1s, color 0.1s;
    }
    .add-row:hover { background: var(--row-hover); color: var(--text); }

    /* Footer */
    .footer {
      border-top: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }

    .footer-stats {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      display: flex;
      gap: 12px;
    }

    .sync-btn {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.12s;
    }
    .sync-btn:hover { background: var(--row-hover); color: var(--text); border-color: var(--text); }
    .sync-btn.syncing .sync-icon { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,25,22,0.4);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 20px;
      width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      animation: modalIn 0.15s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: 'Geist Mono', monospace;
    }

    .field input, .field select, .field textarea {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text);
      padding: 6px 9px;
      outline: none;
      transition: border-color 0.12s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--text);
    }
    .field textarea { resize: vertical; min-height: 50px; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 16px;
    }

    /* Color swatches for group */
    .color-swatches {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 20px; height: 20px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.12s, transform 0.1s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--text); }

    /* Empty state */
    .empty-group {
      padding: 12px 36px;
      font-size: 11px;
      color: var(--muted2);
      font-style: italic;
    }

    /* Inline edit select overlay */
    .cell-select {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--text);
      padding: 2px 4px;
      outline: none;
      cursor: pointer;
    }

    .sync-status {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      padding: 4px 14px 2px;
      text-align: right;
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <span class="app-title">Tasks</span>
    <span class="badge" id="total-badge">0</span>
  </div>
  <div class="topbar-right">
    <button class="btn-sm" onclick="openAddGroup()">+ Grupo</button>
    <button class="btn-sm primary" onclick="openAddTask(null)">+ Tarefa</button>
  </div>
</div>

<!-- Scroll area -->
<div class="scroll-area">
  <div class="task-table" id="task-table"></div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="footer-stats" id="footer-stats"></div>
  <button class="sync-btn" id="sync-btn" onclick="syncToBoard()">
    <span class="sync-icon">↻</span> sync board
  </button>
</div>

<!-- Modal container -->
<div id="modal-container"></div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────

const GROUP_COLORS = [
  '#FFD166','#C8F135','#06D6A0','#5B8CFF',
  '#FF6B6B','#FF9F43','#A29BFE','#FD79A8',
  '#FDCB6E','#74B9FF'
];

const AVATAR_COLORS = [
  ['#FFD166','#7a5c00'],['#C8F135','#3a5200'],['#5B8CFF','#002080'],
  ['#FF6B6B','#800000'],['#06D6A0','#004d38'],['#A29BFE','#2d007a'],
];

const STATUS_CYCLE = ['todo','doing','review','done'];
const STATUS_LABELS = { todo:'A fazer', doing:'Em andamento', review:'Revisão', done:'Concluído' };
const STATUS_CLASS  = { todo:'s-todo', doing:'s-doing', review:'s-review', done:'s-done' };
const PRI_CYCLE = ['low','med','high'];
const PRI_LABELS = { low:'Baixa', med:'Média', high:'Alta' };
const PRI_CLASS  = { low:'p-low', med:'p-med', high:'p-high' };

let data = loadData();
let globalCounter = data._counter || 1;

function loadData() {
  try {
    const raw = localStorage.getItem('miro_tasks_v2');
    if (raw) return JSON.parse(raw);
  } catch(_) {}
  return {
    _counter: 4,
    groups: [
      { id: 'g1', name: 'Grupo 1', color: '#FFD166', collapsed: false },
      { id: 'g2', name: 'Grupo 2', color: '#C8F135', collapsed: false },
    ],
    tasks: [
      { id: 't1', gid: 'g1', name: 'Item 1', assignee: '', status: 'todo', est: '', priority: 'low', desc: '' },
      { id: 't2', gid: 'g1', name: 'Item 2', assignee: '', status: 'doing', est: '2h', priority: 'med', desc: '' },
      { id: 't3', gid: 'g2', name: 'Item 3', assignee: '', status: 'review', est: '1h', priority: 'high', desc: '' },
    ]
  };
}

function save() {
  data._counter = globalCounter;
  localStorage.setItem('miro_tasks_v2', JSON.stringify(data));
  renderTable();
  updateBadge();
}

function newId(prefix) {
  return `${prefix}${Date.now()}${Math.random().toString(36).slice(2,5)}`;
}

// ── Render ────────────────────────────────────────────────────────────────────

function updateBadge() {
  document.getElementById('total-badge').textContent = data.tasks.length;
  const done = data.tasks.filter(t => t.status === 'done').length;
  document.getElementById('footer-stats').innerHTML = `
    <span>${data.tasks.length} tarefas</span>
    <span>${done} concluídas</span>
    <span>${data.groups.length} grupos</span>
  `;
}

function avatarFor(name) {
  if (!name) return '';
  const idx = name.charCodeAt(0) % AVATAR_COLORS.length;
  const [bg, fg] = AVATAR_COLORS[idx];
  const initials = name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  return `<div class="avatar" style="background:${bg};color:${fg}">${initials}</div>`;
}

function renderTable() {
  const table = document.getElementById('task-table');
  table.innerHTML = '';

  data.groups.forEach((group, gi) => {
    const tasks = data.tasks.filter(t => t.gid === group.id);
    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    groupEl.dataset.gid = group.id;

    // Group header
    groupEl.innerHTML = `
      <div class="group-header">
        <button class="group-toggle ${group.collapsed ? 'collapsed' : ''}"
          onclick="toggleGroup('${group.id}')">▼</button>
        <span class="group-label"
          style="background:${group.color}20;color:${group.color}"
          ondblclick="renameGroup('${group.id}')"
        >${group.name}</span>
        <span class="group-count">${tasks.length}</span>
        <div class="group-actions">
          <button class="group-action-btn" onclick="openAddTask('${group.id}')" title="Adicionar tarefa">+</button>
          <button class="group-action-btn" onclick="deleteGroup('${group.id}')" title="Excluir grupo">✕</button>
        </div>
      </div>`;

    if (!group.collapsed) {
      // Col headers
      const headers = document.createElement('div');
      headers.className = 'col-headers';
      headers.innerHTML = `
        <div></div>
        <div class="col-header"><span class="col-icon">□</span> Tarefa</div>
        <div class="col-header">👤 Resp.</div>
        <div class="col-header">◎ Status</div>
        <div class="col-header"># Est.</div>
        <div class="col-header">⚑ Prior.</div>
        <div class="col-header">≡ Descrição</div>
      `;
      groupEl.appendChild(headers);

      // Tasks
      if (tasks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-group';
        empty.textContent = 'Sem tarefas — clique em + para adicionar';
        groupEl.appendChild(empty);
      } else {
        tasks.forEach((task, ti) => {
          groupEl.appendChild(buildTaskRow(task, gi * 100 + ti + 1));
        });
      }

      // Add row
      const addRow = document.createElement('div');
      addRow.className = 'add-row';
      addRow.innerHTML = `<span>+</span><span>Adicionar tarefa</span>`;
      addRow.onclick = () => openAddTask(group.id);
      groupEl.appendChild(addRow);
    }

    table.appendChild(groupEl);
  });
}

function buildTaskRow(task, num) {
  const row = document.createElement('div');
  row.className = 'task-row';
  row.dataset.tid = task.id;

  row.innerHTML = `
    <div class="row-num">${num}</div>
    <div class="row-name" contenteditable="true"
      onblur="updateTaskField('${task.id}','name',this.textContent.trim())"
      onkeydown="if(event.key==='Enter'){this.blur();event.preventDefault()}"
    >${esc(task.name)}</div>
    <div class="cell">
      ${task.assignee
        ? `<span title="${esc(task.assignee)}">${avatarFor(task.assignee)}</span>`
        : `<span style="font-size:10px;color:var(--muted2);cursor:pointer"
            onclick="promptAssignee('${task.id}')">—</span>`
      }
    </div>
    <div class="cell">
      <button class="status-pill ${STATUS_CLASS[task.status]}"
        onclick="cycleStatus('${task.id}')">${STATUS_LABELS[task.status]}</button>
    </div>
    <div class="cell">
      <span class="est-val" style="cursor:pointer"
        onclick="promptEst('${task.id}')">${task.est || '—'}</span>
    </div>
    <div class="cell ${PRI_CLASS[task.priority]}" style="cursor:pointer"
      onclick="cyclePriority('${task.id}')">
      <div class="pri-dot"></div>
      <span class="pri-label">${PRI_LABELS[task.priority]}</span>
    </div>
    <div class="cell" style="flex:1;min-width:0">
      <span class="desc-cell" title="${esc(task.desc)}"
        onclick="promptDesc('${task.id}')">${task.desc || '—'}</span>
      <div class="row-actions">
        <button class="row-action-btn" onclick="openEditTask('${task.id}')" title="Editar">✎</button>
        <button class="row-action-btn danger" onclick="deleteTask('${task.id}')" title="Excluir">✕</button>
      </div>
    </div>
  `;
  return row;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Interactions ──────────────────────────────────────────────────────────────

function toggleGroup(gid) {
  const g = data.groups.find(g => g.id === gid);
  if (g) { g.collapsed = !g.collapsed; save(); }
}

function cycleStatus(tid) {
  const t = data.tasks.find(t => t.id === tid);
  if (!t) return;
  const i = STATUS_CYCLE.indexOf(t.status);
  t.status = STATUS_CYCLE[(i + 1) % STATUS_CYCLE.length];
  save();
}

function cyclePriority(tid) {
  const t = data.tasks.find(t => t.id === tid);
  if (!t) return;
  const i = PRI_CYCLE.indexOf(t.priority);
  t.priority = PRI_CYCLE[(i + 1) % PRI_CYCLE.length];
  save();
}

function updateTaskField(tid, field, value) {
  const t = data.tasks.find(t => t.id === tid);
  if (!t || t[field] === value) return;
  t[field] = value;
  save();
}

function promptAssignee(tid) {

  if (val === null) return;
  t.assignee = val.trim();

}

function promptEst(tid) {
  const t = data.tasks.find(t => t.id === tid);
  const val = prompt('Estimativa (ex: 2h, 3d):', t.est || '');
  if (val === null) return;
  t.est = val.trim();
  save();
}

function promptDesc(tid) {
  const t = data.tasks.find(t => t.id === tid);
  const val = prompt('Descrição:', t.desc || '');
  if (val === null) return;
  t.desc = val.trim();
  save();
}

function deleteTask(tid) {
  data.tasks = data.tasks.filter(t => t.id !== tid);
  save();
}

function deleteGroup(gid) {
  if (!confirm('Excluir grupo e todas as suas tarefas?')) return;
  data.groups = data.groups.filter(g => g.id !== gid);
  data.tasks  = data.tasks.filter(t => t.gid !== gid);

  const g = data.groups.find(g => g.id === gid);

// ── Modals ────────────────────────────────────────────────────────────────────

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

function openAddGroup() {
  let selectedColor = GROUP_COLORS[data.groups.length % GROUP_COLORS.length];
  const swatches = GROUP_COLORS.map(c =>
    `<div class="color-swatch ${c===selectedColor?'selected':''}"
      style="background:${c}"
      onclick="selectSwatch(this,'${c}')"></div>`
  ).join('');

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Novo Grupo</h3>
        <div class="field">
          <label>Nome</label>
          <input type="text" id="mg-name" placeholder="ex: Produto, Design, Backend" autofocus/>
        </div>
        <div class="field">
          <label>Cor</label>
          <div class="color-swatches" id="swatch-container">${swatches}</div>
          <input type="hidden" id="mg-color" value="${selectedColor}"/>
        </div>
        <div class="modal-actions">
          <button class="btn-sm" onclick="closeModal()">Cancelar</button>
          <button class="btn-sm primary" onclick="confirmAddGroup()">Criar</button>
        </div>
      </div>
    </div>`;
  document.getElementById('mg-name').focus();
}

window.selectSwatch = function(el, color) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('mg-color').value = color;
};

function confirmAddGroup() {
  const name = document.getElementById('mg-name').value.trim();
  const color = document.getElementById('mg-color').value;
  if (!name) return;
  data.groups.push({ id: newId('g'), name, color, collapsed: false });
  save(); closeModal();
}

function openAddTask(gid) {

    `<option value="${g.id}" ${g.id===defaultGid?'selected':''}>${g.name}</option>`

    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Nova Tarefa</h3>
        <div class="field">
          <label>Nome</label>
          <input type="text" id="mt-name" placeholder="Descreva a tarefa..." autofocus/>
        </div>
        <div class="field">
          <label>Grupo</label>
          <select id="mt-gid">${groupOpts}</select>
        </div>
        <div class="field">
          <label>Responsável</label>
          <input type="text" id="mt-assignee" placeholder="Nome da pessoa"/>
        </div>
        <div class="field">
          <label>Status</label>

        </div>
        <div class="field">
          <label>Prioridade</label>

          <label>Estimativa</label>
          <input type="text" id="mt-est" placeholder="ex: 2h, 1d"/>

        <div class="field">
          <label>Descrição</label>
          <textarea id="mt-desc" placeholder="Detalhes opcionais..."></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-sm" onclick="closeModal()">Cancelar</button>
          <button class="btn-sm primary" onclick="confirmAddTask()">Criar</button>

function confirmAddTask() {
  const name = document.getElementById('mt-name').value.trim();
  if (!name) return;
  const task = {
    id: newId('t'),
    gid: document.getElementById('mt-gid').value,

    status: document.getElementById('mt-status').value,

          <label>Prioridade</label>

        <div class="field">
          <label>Estimativa</label>
          <input type="text" id="mt-est" value="${esc(task.est)}"/>

        <div class="field">
          <label>Descrição</label>

}

function confirmEditTask(tid) {
  const task = data.tasks.find(t => t.id === tid);

  save(); closeModal();
}

// ── Miro Sync ─────────────────────────────────────────────────────────────────

async function syncTaskToBoard(task) {
  try {
    const group = data.groups.find(g => g.id === task.gid);
    const color = group ? group.color : '#FFD166';
    const viewport = await miro.board.viewport.get();

    const card = await miro.board.createCard({
      title: task.name,
      description: [
        task.assignee ? `👤 ${task.assignee}` : '',
        `◎ ${STATUS_LABELS[task.status]}`,
        task.est ? `# ${task.est}` : '',
        `⚑ ${PRI_LABELS[task.priority]}`,
        task.desc || '',
      ].filter(Boolean).join('\n'),
      x: viewport.x + Math.random() * 200 - 100,
      y: viewport.y + Math.random() * 200 - 100,
      style: { cardTheme: color },
    });

    // Salva referência do card no Miro
    task._miroId = card.id;
    save();
  } catch(e) {
    console.warn('Sync individual falhou:', e);
  }
}

async function syncToBoard() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('syncing');
  btn.querySelector('.sync-icon').textContent = '↻';

  try {
    const viewport = await miro.board.viewport.get();
    const CARD_W = 220, CARD_H = 80, PAD = 16;
    let col = 0, row = 0;
    const COLS = 3;

    for (const task of data.tasks) {
      const group = data.groups.find(g => g.id === task.gid);
      const color = group ? group.color : '#FFD166';

      const x = viewport.x + col * (CARD_W + PAD);
      const y = viewport.y + row * (CARD_H + PAD);

      if (task._miroId) {
        try {
          await miro.board.update({
            id: task._miroId,
            title: task.name,
            description: `◎ ${STATUS_LABELS[task.status]} · ⚑ ${PRI_LABELS[task.priority]}${task.assignee ? '\n👤 ' + task.assignee : ''}`,
          });
        } catch(_) {
          // Card foi deletado do board, recria
          delete task._miroId;
        }
      } else {
        const card = await miro.board.createCard({
          title: task.name,
          description: `◎ ${STATUS_LABELS[task.status]} · ⚑ ${PRI_LABELS[task.priority]}${task.assignee ? '\n👤 ' + task.assignee : ''}`,
          x, y,
          style: { cardTheme: color },
        });
        task._miroId = card.id;
      }

      col++;
      if (col >= COLS) { col = 0; row++; }
    }

    save();
    const statusEl = document.querySelector('.sync-status') || (() => {
      const el = document.createElement('div');
      el.className = 'sync-status';
      document.querySelector('.footer').prepend(el);
      return el;
    })();
    const now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    statusEl.textContent = `✓ sincronizado às ${now}`;
    setTimeout(() => { statusEl.textContent = ''; }, 4000);
  } catch(e) {
    console.error('Sync falhou:', e);
  }

  btn.classList.remove('syncing');
}
