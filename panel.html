<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Dashboard</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e6e0;
      --border2: #d0cdc4;
      --text: #1a1916;
      --muted: #9b9890;
      --muted2: #c4c1b8;
      --red: #c0392b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 14px 10px;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .scan-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 5px;
      padding: 5px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity 0.15s;
    }
    .scan-btn:hover { opacity: 0.8; }
    .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .scan-btn .icon { display: inline-block; }
    .scan-btn.scanning .icon { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 28px 7px 30px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--text); }
    .search-input::placeholder { color: var(--muted2); }

    .search-icon {
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted2);
      font-size: 13px;
      pointer-events: none;
    }

    .clear-btn {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 14px; padding: 0;
      display: none;
    }
    .search-input:not(:placeholder-shown) ~ .clear-btn { display: block; }

    .scroll {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }
    .scroll::-webkit-scrollbar { width: 3px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* Total card */
    .total-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--text);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .total-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .total-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
    }

    .section-lbl {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .cat-add {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .cat-input {
      flex: 1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text);
      padding: 6px 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .cat-input:focus { border-color: var(--text); }
    .cat-input::placeholder { color: var(--muted2); }

    .cat-add-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text);
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }
    .cat-add-btn:hover { background: var(--bg); }

    .cat-list { display: flex; flex-direction: column; gap: 6px; }

    .cat-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .cat-row:hover { border-color: var(--border2); }
    .cat-row.active { border-color: var(--text); background: var(--text); }

    .cat-row-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .cat-name { flex: 1; font-size: 12px; font-weight: 500; }
    .cat-row.active .cat-name { color: var(--bg); }

    .cat-count { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); }
    .cat-row.active .cat-count { color: #ffffff99; }

    .cat-bar-bg { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .cat-row.active .cat-bar-bg { background: #ffffff22; }

    .cat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }

    .cat-remove {
      background: none; border: none;
      color: var(--muted2); cursor: pointer;
      font-size: 13px; padding: 0 0 0 4px;
      transition: color 0.12s; flex-shrink: 0;
    }
    .cat-remove:hover { color: var(--red); }
    .cat-row.active .cat-remove { color: #ffffff66; }

    .results-section { margin-top: 16px; }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      animation: fadeUp 0.15s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-item:hover { border-color: var(--border2); background: var(--bg); }

    .result-type {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; color: var(--muted2);
      background: var(--bg); border-radius: 3px;
      padding: 2px 4px; flex-shrink: 0; margin-top: 1px;
    }

    .result-text { flex: 1; font-size: 11px; color: var(--text); line-height: 1.4; word-break: break-word; }
    .result-zoom { color: var(--muted2); font-size: 11px; flex-shrink: 0; margin-top: 1px; }

    .highlight { background: #ffeb3b55; border-radius: 2px; padding: 0 1px; }

    .empty {
      text-align: center;
      padding: 24px 10px;
      color: var(--muted);
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .empty .ico { font-size: 24px; margin-bottom: 8px; }

    .footer {
      border-top: 1px solid var(--border);
      padding: 7px 14px;
      background: var(--surface);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="title">Task Dashboard</span>
    <button class="scan-btn" id="scan-btn" onclick="scanBoard()">
      <span class="icon">↻</span> Escanear
    </button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search-input" type="text"
      placeholder="Filtrar por texto..."
      oninput="onSearch(this.value)"/>
    <button class="clear-btn" onclick="clearSearch()">×</button>
  </div>
</div>

<div class="scroll" id="scroll">
  <div class="empty">
    <div class="ico">📋</div>
    Clique em "Escanear" para<br>ler os itens do board
  </div>
</div>

<div class="footer">
  <span id="footer-left">—</span>
  <span id="footer-right">—</span>
</div>

<script>
const COLORS = ['#C8F135','#5B8CFF','#FF6B6B','#06D6A0','#FFD166','#FF9F43','#A29BFE','#FD79A8','#74B9FF','#00CEC9'];
const TEXT_TYPES = ['sticky_note','text','shape','card','app_card','frame'];

let allItems = [];
let categories = loadCats();
let activeFilter = null;
let searchQuery = '';
let scanTime = null;

function loadCats() {
  try {
    const r = localStorage.getItem('miro_dash_cats_v2');
    if (r) return JSON.parse(r);
  } catch(_) {}
  return [];
}

function saveCats() {
  localStorage.setItem('miro_dash_cats_v2', JSON.stringify(categories));
}

function extractText(item) {
  return (item.content || item.title || item.text || '').replace(/<[^>]*>/g, '').trim();
}

async function scanBoard() {
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.classList.add('scanning');
  btn.innerHTML = '<span class="icon">↻</span> Lendo...';
  try {
    const items = await miro.board.get();
    allItems = items
      .filter(i => TEXT_TYPES.includes(i.type))
      .map(i => ({ id: i.id, type: i.type, text: extractText(i) }))
      .filter(i => i.text.length > 0);
    scanTime = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    activeFilter = null;
    searchQuery = '';
    document.getElementById('search-input').value = '';
    render();
  } catch(e) { console.error(e); }
  btn.disabled = false;
  btn.classList.remove('scanning');
  btn.innerHTML = '<span class="icon">↻</span> Escanear';
}

function render() {
  const scroll = document.getElementById('scroll');
  scroll.innerHTML = '';

  if (allItems.length === 0) {
    scroll.innerHTML = '<div class="empty"><div class="ico">📋</div>Clique em "Escanear" para<br>ler os itens do board</div>';
    document.getElementById('footer-left').textContent = '—';
    document.getElementById('footer-right').textContent = '—';
    return;
  }

  const query = searchQuery.toLowerCase();
  const filtered = query ? allItems.filter(i => i.text.toLowerCase().includes(query)) : allItems;

  // Total card
  const totalEl = document.createElement('div');
  totalEl.className = 'total-card';
  totalEl.innerHTML = `
    <span class="total-label">Total de itens</span>
    <span class="total-val">${allItems.length}</span>
  `;
  scroll.appendChild(totalEl);

  // Categories
  const counts = {};
  categories.forEach(c => {
    counts[c.keyword] = allItems.filter(i => i.text.toLowerCase().includes(c.keyword.toLowerCase())).length;
  });
  const maxCount = Math.max(...Object.values(counts), 1);

  const catSection = document.createElement('div');
  catSection.innerHTML = `<div class="section-lbl">Categorias</div>`;

  const addEl = document.createElement('div');
  addEl.className = 'cat-add';
  addEl.innerHTML = `
    <input class="cat-input" id="cat-input" placeholder="nova categoria..." maxlength="30"/>
    <button class="cat-add-btn" onclick="addCategory()">+ Add</button>
  `;
  catSection.appendChild(addEl);

  const catList = document.createElement('div');
  catList.className = 'cat-list';

  if (categories.length === 0) {
    catList.innerHTML = `<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted2);padding:6px 0">Adicione categorias acima</div>`;
  } else {
    categories.forEach((cat, i) => {
      const n = counts[cat.keyword] || 0;
      const pct = Math.round((n / maxCount) * 100);
      const isActive = activeFilter === cat.keyword;
      const row = document.createElement('div');
      row.className = `cat-row${isActive ? ' active' : ''}`;
      row.onclick = (e) => { if (e.target.classList.contains('cat-remove')) return; toggleFilter(cat.keyword); };
      row.innerHTML = `
        <div class="cat-row-top">
          <div class="cat-dot" style="background:${cat.color}"></div>
          <span class="cat-name">${cat.keyword}</span>
          <span class="cat-count">${n}</span>
          <button class="cat-remove" onclick="removeCategory(${i})">×</button>
        </div>
        <div class="cat-bar-bg">
          <div class="cat-bar-fill" style="width:${pct}%;background:${cat.color}"></div>
        </div>
      `;
      catList.appendChild(row);
    });
  }

  catSection.appendChild(catList);
  scroll.appendChild(catSection);

  // Results
  const resultItems = activeFilter
    ? filtered.filter(i => i.text.toLowerCase().includes(activeFilter.toLowerCase()))
    : (query ? filtered : []);

  if (resultItems.length > 0) {
    const resSection = document.createElement('div');
    resSection.className = 'results-section';
    const label = activeFilter
      ? `"${activeFilter}"${query ? ` + "${query}"` : ''} — ${resultItems.length}`
      : `"${query}" — ${resultItems.length}`;
    resSection.innerHTML = `<div class="section-lbl">${label}</div>`;
    resultItems.forEach(item => {
      const el = document.createElement('div');
      el.className = 'result-item';
      el.onclick = () => zoomToItem(item.id);
      const highlighted = query
        ? item.text.replace(new RegExp(`(${escReg(query)})`, 'gi'), '<span class="highlight">$1</span>')
        : item.text;
      el.innerHTML = `
        <span class="result-type">${item.type.replace('_',' ')}</span>
        <span class="result-text">${highlighted}</span>
        <span class="result-zoom">⊕</span>
      `;
      resSection.appendChild(el);
    });
    scroll.appendChild(resSection);
  }

  document.getElementById('footer-left').textContent = scanTime ? `↻ ${scanTime}` : '—';
  document.getElementById('footer-right').textContent = `${allItems.length} itens`;

  // Rebind input
  const inp = document.getElementById('cat-input');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') addCategory(); });
}

function toggleFilter(keyword) {
  activeFilter = activeFilter === keyword ? null : keyword;
  render();
}

function onSearch(val) { searchQuery = val; render(); }
function clearSearch() { searchQuery = ''; document.getElementById('search-input').value = ''; render(); }

function addCategory() {
  const input = document.getElementById('cat-input');
  if (!input) return;
  const val = input.value.trim().toLowerCase();
  if (!val || categories.find(c => c.keyword === val)) { input.value = ''; return; }
  categories.push({ keyword: val, color: COLORS[categories.length % COLORS.length] });
  saveCats();
  input.value = '';
  render();
}

function removeCategory(i) {
  if (activeFilter === categories[i].keyword) activeFilter = null;
  categories.splice(i, 1);
  saveCats();
  render();
}

async function zoomToItem(id) {
  try {
    const items = await miro.board.get({ id });
    if (items.length > 0) { await miro.board.select({ id }); await miro.board.viewport.zoomTo(items); }
  } catch(e) { console.warn(e); }
}

function escReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

let debounce;
function scheduleRefresh() {
  clearTimeout(debounce);
  debounce = setTimeout(() => { if (allItems.length > 0) scanBoard(); }, 1200);
}

miro.onReady(() => {
  miro.board.ui.on('items:create', scheduleRefresh);
  miro.board.ui.on('items:update', scheduleRefresh);
  miro.board.ui.on('items:delete', scheduleRefresh);
  render();
});
</script>
</body>
</html>
