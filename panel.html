<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Finder</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e6e0;
      --border2: #d0cdc4;
      --text: #1a1916;
      --muted: #9b9890;
      --muted2: #c4c1b8;
      --red: #e8503a;
      --green: #1a7a45;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .header-btns { display: flex; gap: 6px; }

    .icon-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 3px 7px;
      transition: all 0.12s;
      font-family: 'IBM Plex Mono', monospace;
      white-space: nowrap;
    }
    .icon-btn:hover { background: var(--bg); color: var(--text); border-color: var(--text); }
    .icon-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* Search */
    .search-bar {
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 28px 7px 28px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--text); }
    .search-input::placeholder { color: var(--muted2); }
    .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted2); font-size: 13px; pointer-events: none; }
    .clear-search { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0; display: none; }
    .search-input:not(:placeholder-shown) ~ .clear-search { display: block; }

    /* Cache status */
    .cache-bar {
      padding: 5px 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .cache-info {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
    }

    .cache-info.loaded { color: var(--green); }

    .reload-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      background: none;
      border: 1px solid var(--border2);
      border-radius: 3px;
      color: var(--muted);
      padding: 2px 6px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .reload-btn:hover { color: var(--text); border-color: var(--text); }
    .reload-btn.spinning { animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Minimized */
    .minimized-bar {
      display: none;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      overflow-y: auto;
      flex: 1;
    }

    .mini-btn {
      width: 100%;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      border: none;
      border-radius: 5px;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: opacity 0.12s, transform 0.1s;
      color: #1a1916;
    }
    .mini-btn:hover { opacity: 0.85; transform: translateX(2px); }
    .mini-count { font-size: 9px; opacity: 0.7; background: rgba(0,0,0,0.12); border-radius: 3px; padding: 1px 5px; }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 7px 0;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color 0.12s, border-color 0.12s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    /* Body */
    .tab-body { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-body.active { display: flex; }

    .scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .scroll::-webkit-scrollbar { width: 3px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .section-lbl {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* Results */
    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      animation: fadeUp 0.12s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }
    .result-item:hover { border-color: var(--border2); background: var(--bg); }
    .result-text { flex: 1; font-size: 11px; line-height: 1.4; word-break: break-word; }
    .result-type { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: var(--muted2); background: var(--bg); border-radius: 3px; padding: 2px 4px; flex-shrink: 0; margin-top: 1px; }
    .result-zoom { color: var(--muted2); font-size: 11px; flex-shrink: 0; margin-top: 1px; }
    .highlight { background: #ffeb3b66; border-radius: 2px; padding: 0 1px; }

    /* Terms tab */
    .add-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .term-input {
      flex: 1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text);
      padding: 6px 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .term-input:focus { border-color: var(--text); }
    .term-input::placeholder { color: var(--muted2); }
    .add-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 5px;
      padding: 6px 10px;
      cursor: pointer;
      transition: opacity 0.12s;
    }
    .add-btn:hover { opacity: 0.8; }

    .color-row { display: flex; gap: 5px; margin-bottom: 14px; flex-wrap: wrap; }
    .color-opt { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.12s, transform 0.1s; }
    .color-opt:hover { transform: scale(1.2); }
    .color-opt.selected { border-color: var(--text); }

    .term-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 7px;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      margin-bottom: 6px;
    }
    .term-card:hover { background: var(--bg); transform: translateX(2px); }
    .term-card:active { transform: scale(0.98); }

    .term-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .term-name { flex: 1; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; }
    .term-count { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--muted); background: var(--bg); border-radius: 3px; padding: 1px 5px; min-width: 20px; text-align: center; }
    .term-bar-wrap { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; overflow: hidden; }
    .term-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .term-inner { flex: 1; min-width: 0; }
    .term-remove { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 13px; padding: 0; transition: color 0.12s; flex-shrink: 0; }
    .term-remove:hover { color: var(--red); }

    .empty { text-align: center; padding: 24px 10px; color: var(--muted2); font-family: 'IBM Plex Mono', monospace; font-size: 10px; line-height: 1.6; }

    /* Status */
    .status-bar {
      border-top: 1px solid var(--border);
      padding: 5px 12px;
      background: var(--surface);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .status-ok { color: var(--green); }
  </style>
</head>
<body>

<div class="header">
  <span class="title" id="header-title">Task Finder</span>
  <div class="header-btns">
    <button class="icon-btn" id="minimize-btn" onclick="toggleMinimize()">—</button>
  </div>
</div>

<!-- Cache bar -->
<div class="cache-bar" id="cache-bar">
  <span class="cache-info" id="cache-info">Não carregado</span>
  <button class="reload-btn" id="reload-btn" onclick="loadCache()">↻ Carregar</button>
</div>

<!-- Search -->
<div class="search-bar" id="search-bar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search-input" type="text" placeholder="Buscar no board..." autocomplete="off"/>
    <button class="clear-search" onclick="clearSearch()">×</button>
  </div>
</div>

<!-- Minimized -->
<div class="minimized-bar" id="minimized-bar"></div>

<!-- Tabs -->
<div class="tabs" id="tabs">
  <button class="tab active" onclick="switchTab('results')">Resultados</button>
  <button class="tab" onclick="switchTab('terms')">Categorias</button>
</div>

<!-- Results tab -->
<div class="tab-body active" id="tab-results">
  <div class="scroll" id="results-scroll">
    <div class="empty">↑ Carregue o board e<br>digite para buscar</div>
  </div>
</div>

<!-- Terms tab -->
<div class="tab-body" id="tab-terms">
  <div class="scroll">
    <div class="section-lbl">Nova categoria</div>
    <div class="add-row">
      <input class="term-input" id="term-input" placeholder="ex: GWPP, bug..." maxlength="40"/>
      <button class="add-btn" onclick="addTerm()">+ Add</button>
    </div>
    <div class="color-row" id="color-row"></div>
    <div class="section-lbl">Categorias — clique para filtrar</div>
    <div id="terms-grid"></div>
  </div>
</div>

<div class="status-bar">
  <span id="status-l">—</span>
  <span id="status-r" class="status-ok"></span>
</div>

<script>
const COLORS = ['#C8F135','#5B8CFF','#FF6B6B','#06D6A0','#FFD166','#FF9F43','#A29BFE','#FD79A8','#74B9FF','#00CEC9'];
const SEARCH_TYPES = ['text','shape'];

let cache = [];
let cacheLoaded = false;
let terms = loadTerms();
let selectedColor = COLORS[0];
let minimized = false;
let activeTab = 'results';
let searchDebounce = null;

function loadTerms() {
  try { const r = localStorage.getItem('miro_finder_v5'); if (r) return JSON.parse(r); } catch(_) {}
  return [];
}
function saveTerms() { localStorage.setItem('miro_finder_v5', JSON.stringify(terms)); }

function extractText(item) {
  return (item.content || item.title || item.text || '').replace(/<[^>]*>/g,'').trim();
}

// ── Cache ─────────────────────────────────────────────────────────────────────
async function loadCache() {
  const btn = document.getElementById('reload-btn');
  const info = document.getElementById('cache-info');
  btn.textContent = '↻';
  btn.classList.add('spinning');
  info.textContent = 'Carregando...';
  info.className = 'cache-info';

  try {
    const [texts, shapes] = await Promise.all([
      miro.board.get({ type: 'text' }),
      miro.board.get({ type: 'shape' })
    ]);
    const items = [...texts, ...shapes];
    cache = items
      .map(i => ({ id: i.id, type: i.type, text: extractText(i) }))
      .filter(i => i.text.length > 0);

    cacheLoaded = true;
    const now = new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    info.textContent = `✓ ${cache.length} itens · ${now}`;
    info.className = 'cache-info loaded';
    setStatus(`${cache.length} itens carregados`);

    // Recalcula contagens das categorias
    recalcCounts();
    renderTerms();

  } catch(e) {
    info.textContent = 'Erro ao carregar';
    console.error(e);
  }

  btn.textContent = '↻ Recarregar';
  btn.classList.remove('spinning');
}

function recalcCounts() {
  terms.forEach(t => {
    t.count = cache.filter(i => i.text.toLowerCase().includes(t.keyword.toLowerCase())).length;
  });
  saveTerms();
}

// ── Search ────────────────────────────────────────────────────────────────────
function initSearch() {
  const input = document.getElementById('search-input');
  input.addEventListener('input', function() {
    clearTimeout(searchDebounce);
    const val = this.value.trim();
    if (!val) { showEmpty(); return; }
    searchDebounce = setTimeout(() => doSearch(val), 300);
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { clearTimeout(searchDebounce); const v = this.value.trim(); if(v) doSearch(v); }
    if (e.key === 'Escape') clearSearch();
  });
}

function doSearch(query) {
  if (!cacheLoaded) {
    showMsg('↑ Clique em "Carregar" primeiro');
    return;
  }
  const q = query.toLowerCase();
  const matched = cache.filter(i => i.text.toLowerCase().includes(q));
  renderResults(matched, query);
  setStatus(`${matched.length} resultado${matched.length!==1?'s':''}`);

  // Zoom nos itens
  if (matched.length > 0) {
    miro.board.select({ id: matched.map(m => m.id) }).catch(()=>{});
    Promise.all([miro.board.get({type:'text'}), miro.board.get({type:'shape'})]).then(([t,s]) => { const items = [...t,...s];
      const found = items.filter(i => matched.some(m => m.id === i.id));
      if (found.length) miro.board.viewport.zoomTo(found).catch(()=>{});
    }).catch(()=>{});
  }

  // Muda para aba resultados
  if (activeTab !== 'results') switchTab('results');
}

function renderResults(items, query) {
  const scroll = document.getElementById('results-scroll');
  scroll.innerHTML = '';

  if (items.length === 0) {
    scroll.innerHTML = `<div class="empty">Nenhum resultado<br>para "${query}"</div>`;
    return;
  }

  const lbl = document.createElement('div');
  lbl.className = 'section-lbl';
  lbl.textContent = `${items.length} resultado${items.length!==1?'s':''}`;
  scroll.appendChild(lbl);

  const q = query.toLowerCase();
  items.slice(0, 50).forEach(item => {
    const hl = item.text.replace(new RegExp(`(${escReg(q)})`, 'gi'), '<span class="highlight">$1</span>');
    const el = document.createElement('div');
    el.className = 'result-item';
    el.onclick = () => zoomTo(item.id);
    el.innerHTML = `
      <span class="result-type">${item.type}</span>
      <span class="result-text">${hl}</span>
      <span class="result-zoom">⊕</span>
    `;
    scroll.appendChild(el);
  });

  if (items.length > 50) {
    const more = document.createElement('div');
    more.style.cssText = 'font-family:IBM Plex Mono,monospace;font-size:9px;color:var(--muted);text-align:center;padding:8px';
    more.textContent = `+${items.length-50} mais`;
    scroll.appendChild(more);
  }
}

function showEmpty() {
  document.getElementById('results-scroll').innerHTML = '<div class="empty">↑ Carregue o board e<br>digite para buscar</div>';
}

function showMsg(msg) {
  document.getElementById('results-scroll').innerHTML = `<div class="empty">${msg}</div>`;
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  showEmpty();
}

// ── Terms ─────────────────────────────────────────────────────────────────────
function renderColorRow() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const el = document.createElement('div');
    el.className = `color-opt${c===selectedColor?' selected':''}`;
    el.style.background = c;
    el.onclick = () => { selectedColor = c; renderColorRow(); };
    row.appendChild(el);
  });
}

function renderTerms() {
  const grid = document.getElementById('terms-grid');
  grid.innerHTML = '';

  if (terms.length === 0) {
    grid.innerHTML = '<div class="empty">Nenhuma categoria.<br>Adicione acima ↑</div>';
    renderMinimized();
    return;
  }

  const maxCount = Math.max(...terms.map(t => t.count || 0), 1);

  terms.forEach((term, i) => {
    const n = term.count || 0;
    const pct = Math.round((n / maxCount) * 100);
    const card = document.createElement('div');
    card.className = 'term-card';
    card.style.borderLeftColor = term.color;
    card.onclick = (e) => { if(e.target.classList.contains('term-remove')) return; filterByTerm(i); };
    card.innerHTML = `
      <div class="term-dot" style="background:${term.color}"></div>
      <div class="term-inner">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="term-name">${term.keyword}</span>
          <span class="term-count">${n}</span>
        </div>
        <div class="term-bar-wrap">
          <div class="term-bar" style="width:${pct}%;background:${term.color}"></div>
        </div>
      </div>
      <button class="term-remove" onclick="removeTerm(${i})">×</button>
    `;
    grid.appendChild(card);
  });

  document.getElementById('status-l').textContent = `${terms.length} categoria${terms.length!==1?'s':''}`;
  renderMinimized();
}

function filterByTerm(i) {
  const term = terms[i];
  document.getElementById('search-input').value = term.keyword;
  doSearch(term.keyword);
}

function addTerm() {
  const input = document.getElementById('term-input');
  const val = input.value.trim();
  if (!val || terms.find(t => t.keyword.toLowerCase() === val.toLowerCase())) { input.value = ''; return; }
  const count = cacheLoaded ? cache.filter(i => i.text.toLowerCase().includes(val.toLowerCase())).length : undefined;
  terms.push({ keyword: val, color: selectedColor, count });
  selectedColor = COLORS[terms.length % COLORS.length];
  saveTerms();
  input.value = '';
  renderColorRow();
  renderTerms();
}

function removeTerm(i) {
  terms.splice(i, 1);
  saveTerms();
  renderTerms();
}

function renderMinimized() {
  const bar = document.getElementById('minimized-bar');
  bar.innerHTML = '';
  terms.forEach((term, i) => {
    const btn = document.createElement('button');
    btn.className = 'mini-btn';
    btn.style.background = term.color + '33';
    btn.style.borderLeft = `3px solid ${term.color}`;
    btn.innerHTML = `<span>${term.keyword}</span><span class="mini-count">${term.count ?? '?'}</span>`;
    btn.onclick = () => filterByTerm(i);
    bar.appendChild(btn);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
async function zoomTo(id) {
  try {
    const [texts, shapes] = await Promise.all([
      miro.board.get({ type: 'text' }),
      miro.board.get({ type: 'shape' })
    ]);
    const items = [...texts, ...shapes];
    const item = items.find(i => i.id === id);
    if (item) { await miro.board.select({ id }); await miro.board.viewport.zoomTo([item]); }
  } catch(e) {}
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['results','terms'][i] === tab));
  document.getElementById('tab-results').classList.toggle('active', tab === 'results');
  document.getElementById('tab-terms').classList.toggle('active', tab === 'terms');
}

function toggleMinimize() {
  minimized = !minimized;
  ['cache-bar','search-bar','tabs','tab-results','tab-terms','status-bar'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = minimized ? 'none' : '';
  });
  const miniBar = document.getElementById('minimized-bar');
  const btn = document.getElementById('minimize-btn');
  const title = document.getElementById('header-title');
  miniBar.style.display = minimized ? 'flex' : 'none';
  // Restore active tab
  if (!minimized) {
    document.getElementById(`tab-${activeTab}`).style.display = 'flex';
    document.getElementById('cache-bar').style.display = 'flex';
  }
  btn.textContent = minimized ? '▲' : '—';
  title.textContent = minimized ? `Finder (${terms.length})` : 'Task Finder';
}

function setStatus(msg) {
  const el = document.getElementById('status-r');
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

function escReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

document.getElementById('term-input').addEventListener('keydown', e => { if(e.key==='Enter') addTerm(); });

miro.onReady(() => {
  initSearch();
  renderColorRow();
  renderTerms();
});
</script>
</body>
</html>
