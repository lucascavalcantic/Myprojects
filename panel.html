<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Finder</title>
  <script src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e8e6e0;
      --border2: #d0cdc4;
      --text: #1a1916;
      --muted: #9b9890;
      --muted2: #c4c1b8;
      --red: #e8503a;
      --green: #1a7a45;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 3px 7px;
      transition: all 0.12s;
      font-family: 'IBM Plex Mono', monospace;
    }
    .icon-btn:hover { background: var(--bg); color: var(--text); border-color: var(--text); }

    /* ── Search bar ── */
    .search-section {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      flex-shrink: 0;
    }

    .search-wrap { position: relative; }

    .search-input {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 32px 8px 32px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--text); }
    .search-input::placeholder { color: var(--muted2); }

    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted2);
      font-size: 14px;
      pointer-events: none;
    }

    .clear-btn {
      position: absolute;
      right: 9px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 15px; padding: 0;
      display: none;
      transition: color 0.12s;
    }
    .clear-btn:hover { color: var(--text); }
    .search-input:not(:placeholder-shown) ~ .clear-btn { display: block; }

    .search-hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted2);
      margin-top: 5px;
      text-align: right;
    }

    /* ── Minimized ── */
    .minimized-bar {
      display: none;
      flex-direction: column;
      gap: 4px;
      padding: 8px;
      overflow-y: auto;
      flex: 1;
    }
    .minimized-bar::-webkit-scrollbar { width: 2px; }
    .minimized-bar::-webkit-scrollbar-thumb { background: var(--border2); }

    .mini-btn {
      width: 100%;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      border: none;
      border-radius: 5px;
      padding: 7px 8px;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: opacity 0.12s, transform 0.1s;
      color: #1a1916;
    }
    .mini-btn:hover { opacity: 0.85; transform: translateX(2px); }
    .mini-count { font-size: 9px; opacity: 0.7; background: rgba(0,0,0,0.12); border-radius: 3px; padding: 1px 5px; }

    /* ── Expanded ── */
    .expanded-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .scroll::-webkit-scrollbar { width: 3px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .section-lbl {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* Add term */
    .add-row { display: flex; gap: 6px; margin-bottom: 10px; }

    .term-input {
      flex: 1;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text);
      padding: 6px 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .term-input:focus { border-color: var(--text); }
    .term-input::placeholder { color: var(--muted2); }

    .add-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 5px;
      padding: 6px 10px;
      cursor: pointer;
      transition: opacity 0.12s;
    }
    .add-btn:hover { opacity: 0.8; }

    .color-row { display: flex; gap: 5px; margin-bottom: 14px; flex-wrap: wrap; }

    .color-opt {
      width: 18px; height: 18px;
      border-radius: 50%; cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.12s, transform 0.1s;
    }
    .color-opt:hover { transform: scale(1.2); }
    .color-opt.selected { border-color: var(--text); }

    /* Term cards */
    .terms-grid { display: flex; flex-direction: column; gap: 6px; }

    .term-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.12s, transform 0.1s;
    }
    .term-card:hover { border-color: var(--border2); transform: translateX(2px); }
    .term-card:active { transform: scale(0.98); }
    .term-card.searching { opacity: 0.5; cursor: wait; }

    .term-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .term-name { flex: 1; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; }
    .term-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; color: var(--muted);
      background: var(--bg); border-radius: 3px; padding: 1px 5px;
    }
    .term-remove {
      background: none; border: none; color: var(--muted2);
      cursor: pointer; font-size: 13px; padding: 0;
      transition: color 0.12s; flex-shrink: 0;
    }
    .term-remove:hover { color: var(--red); }

    /* Results */
    .results-area { margin-top: 14px; }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: border-color 0.12s;
      animation: fadeUp 0.12s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-item:hover { border-color: var(--border2); background: var(--bg); }

    .result-text { flex: 1; font-size: 11px; line-height: 1.4; word-break: break-word; }
    .result-zoom { color: var(--muted2); font-size: 11px; flex-shrink: 0; margin-top: 1px; }
    .highlight { background: #ffeb3b66; border-radius: 2px; padding: 0 1px; }

    .empty-terms {
      text-align: center;
      padding: 16px 10px;
      color: var(--muted2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
    }

    /* Status */
    .status-bar {
      border-top: 1px solid var(--border);
      padding: 6px 12px;
      background: var(--surface);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      min-height: 28px;
    }

    .status-msg { color: var(--green); font-weight: 500; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--border2);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <span class="title" id="header-title">Task Finder</span>
  <button class="icon-btn" id="minimize-btn" onclick="toggleMinimize()">—</button>
</div>

<!-- Search bar -->
<div class="search-section" id="search-section">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" id="search-input" type="text"
      placeholder="Buscar no board..."
      autocomplete="off"/>
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()">×</button>
  </div>
  <div class="search-hint" id="search-hint">Digite para buscar</div>
</div>

<!-- Minimized -->
<div class="minimized-bar" id="minimized-bar"></div>

<!-- Expanded -->
<div class="expanded-body" id="expanded-body">
  <div class="scroll" id="scroll">

    <div class="section-lbl">Termos salvos</div>
    <div class="add-row">
      <input class="term-input" id="term-input" placeholder="ex: GWPP, bug..." maxlength="40"/>
      <button class="add-btn" onclick="addTerm()">+ Add</button>
    </div>
    <div class="color-row" id="color-row"></div>
    <div class="terms-grid" id="terms-grid"></div>
    <div class="results-area" id="results-area"></div>

  </div>

  <div class="status-bar">
    <span id="status-left">—</span>
    <span id="status-right" class="status-msg"></span>
  </div>
</div>

<script>
const COLORS = ['#C8F135','#5B8CFF','#FF6B6B','#06D6A0','#FFD166','#FF9F43','#A29BFE','#FD79A8','#74B9FF','#00CEC9'];
// Busca APENAS text e shape (ícones)
const SEARCH_TYPES = ['text', 'shape'];

let terms = loadTerms();
let selectedColor = COLORS[0];
let minimized = false;
let searchDebounce = null;
let lastQuery = '';

function loadTerms() {
  try { const r = localStorage.getItem('miro_finder_v3'); if (r) return JSON.parse(r); } catch(_) {}
  return [];
}
function saveTerms() { localStorage.setItem('miro_finder_v3', JSON.stringify(terms)); }

function extractText(item) {
  return (item.content || item.title || item.text || '').replace(/<[^>]*>/g, '').trim();
}

// ── Search bar ────────────────────────────────────────────────────────────────
function initSearchInput() {
  const input = document.getElementById('search-input');
  input.addEventListener('input', function() {
    const val = this.value.trim();
    clearTimeout(searchDebounce);
    if (!val) {
      clearSearch();
      return;
    }
    document.getElementById('search-hint').innerHTML = '<span class="spinner"></span> aguardando...';
    searchDebounce = setTimeout(() => runSearch(val), 600);
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      clearTimeout(searchDebounce);
      const val = this.value.trim();
      if (val) runSearch(val);
    }
    if (e.key === 'Escape') clearSearch();
  });
}

async function runSearch(query) {
  lastQuery = query;
  document.getElementById('search-hint').innerHTML = '<span class="spinner"></span> buscando...';
  document.getElementById('results-area').innerHTML = '';

  try {
    const items = await miro.board.get({ type: SEARCH_TYPES });
    const q = query.toLowerCase();
    const matched = items.filter(i => extractText(i).toLowerCase().includes(q));

    if (matched.length === 0) {
      document.getElementById('search-hint').textContent = `Nenhum resultado para "${query}"`;
      document.getElementById('results-area').innerHTML = '';
      return;
    }

    document.getElementById('search-hint').textContent = `${matched.length} resultado${matched.length !== 1 ? 's' : ''}`;

    // Zoom nos itens encontrados
    await miro.board.select({ id: matched.map(m => m.id) });
    await miro.board.viewport.zoomTo(matched);

    // Mostra lista
    renderResults(matched, query);

  } catch(e) {
    document.getElementById('search-hint').textContent = 'Erro ao buscar';
    console.error(e);
  }
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-hint').textContent = 'Digite para buscar';
  document.getElementById('results-area').innerHTML = '';
  lastQuery = '';
}

function renderResults(items, query) {
  const area = document.getElementById('results-area');
  area.innerHTML = `<div class="section-lbl" style="margin-top:4px">${items.length} encontrado${items.length!==1?'s':''}</div>`;
  const q = query.toLowerCase();
  items.slice(0, 30).forEach(item => {
    const text = extractText(item);
    const highlighted = text.replace(new RegExp(`(${escReg(q)})`, 'gi'), '<span class="highlight">$1</span>');
    const el = document.createElement('div');
    el.className = 'result-item';
    el.onclick = () => zoomTo(item.id);
    el.innerHTML = `<span class="result-text">${highlighted}</span><span class="result-zoom">⊕</span>`;
    area.appendChild(el);
  });
  if (items.length > 30) {
    area.innerHTML += `<div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);text-align:center;padding:6px">+${items.length-30} mais resultados</div>`;
  }
}

// ── Saved terms ───────────────────────────────────────────────────────────────
function renderColorRow() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const el = document.createElement('div');
    el.className = `color-opt${c === selectedColor ? ' selected' : ''}`;
    el.style.background = c;
    el.onclick = () => { selectedColor = c; renderColorRow(); };
    row.appendChild(el);
  });
}

function renderTerms() {
  const grid = document.getElementById('terms-grid');
  grid.innerHTML = '';
  if (terms.length === 0) {
    grid.innerHTML = '<div class="empty-terms">Salve termos frequentes<br>para busca rápida ↑</div>';
  } else {
    terms.forEach((term, i) => {
      const card = document.createElement('div');
      card.className = 'term-card';
      card.id = `term-${i}`;
      card.onclick = (e) => { if (e.target.classList.contains('term-remove')) return; quickSearch(i); };
      card.innerHTML = `
        <div class="term-dot" style="background:${term.color}"></div>
        <span class="term-name">${term.keyword}</span>
        <span class="term-count" id="tc-${i}">${term.count !== undefined ? term.count : '?'}</span>
        <button class="term-remove" onclick="removeTerm(${i})">×</button>
      `;
      grid.appendChild(card);
    });
  }
  document.getElementById('status-left').textContent = `${terms.length} termo${terms.length!==1?'s':''}`;
  renderMinimized();
}

async function quickSearch(i) {
  const term = terms[i];
  const card = document.getElementById(`term-${i}`);
  if (card) card.classList.add('searching');

  // Preenche a barra de busca
  document.getElementById('search-input').value = term.keyword;
  document.getElementById('search-hint').innerHTML = '<span class="spinner"></span> buscando...';

  try {
    const items = await miro.board.get({ type: SEARCH_TYPES });
    const q = term.keyword.toLowerCase();
    const matched = items.filter(i => extractText(i).toLowerCase().includes(q));

    terms[i].count = matched.length;
    saveTerms();
    const countEl = document.getElementById(`tc-${i}`);
    if (countEl) countEl.textContent = matched.length;

    document.getElementById('search-hint').textContent = `${matched.length} resultado${matched.length!==1?'s':''}`;

    if (matched.length > 0) {
      await miro.board.select({ id: matched.map(m => m.id) });
      await miro.board.viewport.zoomTo(matched);
      renderResults(matched, term.keyword);
    } else {
      document.getElementById('results-area').innerHTML = '';
    }

    setStatus(`✓ ${matched.length} encontrado${matched.length!==1?'s':''}`);
  } catch(e) { console.error(e); }

  if (card) card.classList.remove('searching');
  renderMinimized();
}

function addTerm() {
  const input = document.getElementById('term-input');
  const val = input.value.trim();
  if (!val || terms.find(t => t.keyword.toLowerCase() === val.toLowerCase())) { input.value = ''; return; }
  terms.push({ keyword: val, color: selectedColor, count: undefined });
  selectedColor = COLORS[terms.length % COLORS.length];
  saveTerms();
  input.value = '';
  renderColorRow();
  renderTerms();
}

function removeTerm(i) {
  terms.splice(i, 1);
  saveTerms();
  renderTerms();
}

function renderMinimized() {
  const bar = document.getElementById('minimized-bar');
  bar.innerHTML = '';
  terms.forEach((term, i) => {
    const btn = document.createElement('button');
    btn.className = 'mini-btn';
    btn.style.background = term.color + '33';
    btn.style.borderLeft = `3px solid ${term.color}`;
    btn.innerHTML = `<span>${term.keyword}</span><span class="mini-count">${term.count !== undefined ? term.count : '?'}</span>`;
    btn.onclick = () => quickSearch(i);
    bar.appendChild(btn);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
async function zoomTo(id) {
  try {
    const items = await miro.board.get({ type: SEARCH_TYPES });
    const item = items.find(i => i.id === id);
    if (item) { await miro.board.select({ id }); await miro.board.viewport.zoomTo([item]); }
  } catch(e) {}
}

function toggleMinimize() {
  minimized = !minimized;
  const expanded = document.getElementById('expanded-body');
  const searchSec = document.getElementById('search-section');
  const miniBar = document.getElementById('minimized-bar');
  const btn = document.getElementById('minimize-btn');
  const title = document.getElementById('header-title');
  if (minimized) {
    expanded.style.display = 'none';
    searchSec.style.display = 'none';
    miniBar.style.display = 'flex';
    btn.textContent = '▲';
    title.textContent = `Finder (${terms.length})`;
  } else {
    expanded.style.display = 'flex';
    searchSec.style.display = 'block';
    miniBar.style.display = 'none';
    btn.textContent = '—';
    title.textContent = 'Task Finder';
  }
}

function setStatus(msg) {
  const el = document.getElementById('status-right');
  el.textContent = msg;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

function escReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

miro.onReady(() => {
  initSearchInput();
  renderColorRow();
  renderTerms();
});
</script>
</body>
</html>
